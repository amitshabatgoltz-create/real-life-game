<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Real Life - מולטיפלייר</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0f; height: 100%; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 16px; right: 16px; color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif; background: rgba(0,0,0,0.45);
    padding: 12px 18px; border-radius: 12px; font-size: 14px; line-height: 1.7;
    backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.1); z-index: 10;
  }
  #hud b { color: #7fd8ff; }
  #playerList {
    position: fixed; top: 16px; left: 16px; color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif; background: rgba(0,0,0,0.45);
    padding: 12px 18px; border-radius: 12px; font-size: 13px; line-height: 1.6;
    backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.1); z-index: 10;
    min-width: 140px;
  }
  #playerList b { color: #7fffa1; }
  #nameScreen {
    position: fixed; inset: 0; background: #0a0a0f; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; font-family: 'Segoe UI', Arial, sans-serif; gap: 16px;
  }
  #nameScreen h1 { color: #7fd8ff; margin: 0; }
  #nameScreen input {
    padding: 12px 16px; border-radius: 10px; border: none; font-size: 16px;
    width: 240px; text-align: center;
  }
  #nameScreen button {
    padding: 12px 28px; border-radius: 10px; border: none; font-size: 16px;
    background: #3d7ef5; color: #fff; cursor: pointer; font-weight: bold;
  }
  #nameScreen button:hover { background: #2c65d1; }
  #status {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px; background: rgba(0,0,0,0.35); padding: 8px 16px;
    border-radius: 20px; z-index: 10;
  }
</style>
</head>
<body>

<div id="nameScreen">
  <h1>Real Life</h1>
  <input id="nameInput" type="text" placeholder="בחר שם שחקן" maxlength="20">
  <button id="joinBtn">כניסה למשחק</button>
</div>

<div id="hud" style="display:none">
  <div><b>Real Life</b> - מולטיפלייר</div>
  <div>W A S D - הליכה | Shift - ריצה | Space - קפיצה</div>
  <div>עכבר (לחיצה+גרירה) - הבטה מסביב | V - החלפת מצלמה (גוף ראשון/שלישי)</div>
  <div>+ / - - כיוונון גודל המפה | [ / ] - כיוונון גודל הדמות</div>
  <div>E - כניסה/יציאה מהמכונית (כשקרוב אליה)</div>
</div>
<div id="playerList" style="display:none"><b>מחוברים כעת</b><div id="playerListBody"></div></div>
<div id="status">מתחבר לשרת...</div>
<div id="mapLoading" style="display:none; position:fixed; inset:0; background:#0a0a0f; z-index:150; flex-direction:column; align-items:center; justify-content:center; font-family:'Segoe UI',Arial,sans-serif; color:#7fd8ff; gap:14px;">
  <div>טוען מפת שכונה...</div>
  <div id="mapLoadingPct" style="color:#fff; font-size:13px;">0%</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/utils/SkeletonUtils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script>
let scene, camera, renderer, character;
let clock = new THREE.Clock();
const keys = {};
let mouseDown = false, lastMouseX = 0, lastMouseY = 0;
let cameraYaw = 0, cameraPitch = 0.35;
let cameraMode = 'first'; // 'first' = גוף ראשון (מהעיניים), 'third' = גוף שלישי
let lookPitch = 0; // זווית הבטה למעלה/למטה בגוף ראשון
function getEyeHeight() {
  return TARGET_CHARACTER_HEIGHT * characterScale * 0.93;
}
const CAMERA_DISTANCE = 6;
let verticalVelocity = 0, isGrounded = true;
const GRAVITY = -0.02, JUMP_FORCE = 0.32, WALK_SPEED = 0.045, RUN_SPEED = 0.09;
let facingAngle = 0;

let socket = null;
let selfId = null;
let myName = 'שחקן';
const otherPlayers = new Map(); // id -> {mesh, nameSprite, targetX, targetZ, targetRotY}

document.getElementById('joinBtn').onclick = joinGame;
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });

function joinGame() {
  const val = document.getElementById('nameInput').value.trim();
  myName = val || ('שחקן' + Math.floor(Math.random() * 999));
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('mapLoading').style.display = 'flex';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('playerList').style.display = 'block';
  initGame();
  connectToServer();
}

function connectToServer() {
  socket = io();

  socket.on('connect', () => {
    document.getElementById('status').textContent = 'מחובר לשרת ✓';
    socket.emit('join', { name: myName });
  });

  socket.on('disconnect', () => {
    document.getElementById('status').textContent = 'החיבור לשרת נותק';
  });

  socket.on('init', (data) => {
    selfId = data.selfId;
    data.players.forEach(p => { if (p.id !== selfId) addOtherPlayer(p); });
    updatePlayerListUI();
  });

  socket.on('playerJoined', (data) => {
    if (data.player.id !== selfId) addOtherPlayer(data.player);
    updatePlayerListUI();
  });

  socket.on('playerMoved', (data) => {
    const op = otherPlayers.get(data.id);
    if (op) {
      op.targetX = data.x; op.targetY = data.y || 0; op.targetZ = data.z; op.targetRotY = data.rotY;
      op.moving = data.moving; op.running = data.running;
      if (data.jumped) triggerJump(op.actions);
    }
  });

  socket.on('playerLeft', (data) => {
    removeOtherPlayer(data.id);
    updatePlayerListUI();
  });

  // תיקון אוטומטי כל 3 שניות - מוסיף שחקנים שפספסנו ומסיר כאלה שכבר לא מחוברים
  socket.on('playersSync', (serverPlayers) => {
    const serverIds = new Set(serverPlayers.map(p => p.id));

    // הוספת שחקנים שקיימים בשרת אבל חסרים אצלנו
    serverPlayers.forEach(p => {
      if (p.id !== selfId && !otherPlayers.has(p.id)) {
        addOtherPlayer(p);
      }
    });

    // הסרת שחקנים שאצלנו קיימים אבל כבר לא באמת מחוברים
    otherPlayers.forEach((op, id) => {
      if (!serverIds.has(id)) {
        removeOtherPlayer(id);
      }
    });

    updatePlayerListUI();
  });

  // עדכון מלא של מצב המכונית (מי נוהג, מי נוסע, איפה היא) - מגיע גם מיד וגם בכל שינוי
  socket.on('carState', (state) => {
    carTargetX = state.x; carTargetY = state.y; carTargetZ = state.z; carTargetRotY = state.rotY;
    if (carInstance && !isDriving) {
      carInstance.position.set(state.x, state.y, state.z);
      carInstance.rotation.y = state.rotY;
    }
    carRotationY = state.rotY;

    const wasDriving = isDriving;
    const wasPassenger = isPassenger;
    isDriving = (state.driverId === selfId);
    isPassenger = (state.passengerId === selfId);

    if (isDriving && !wasDriving) {
      carSpeed = 0;
      character.visible = false;
      startEngineSound();
      document.getElementById('status').textContent = 'נוהג/ת - W/S גז/בלם, A/D היגוי, E לצאת';
    } else if (!isDriving && wasDriving) {
      stopEngineSound();
      character.visible = (cameraMode !== 'first');
    }

    if (isPassenger && !wasPassenger) {
      character.visible = false;
      document.getElementById('status').textContent = 'נוסע/ת ברכב - E לצאת';
    } else if (!isPassenger && wasPassenger && !isDriving) {
      character.visible = (cameraMode !== 'first');
    }
  });

  // עדכון מיקום המכונית מהנהג (אם אנחנו לא הנהג בעצמנו)
  socket.on('carMoved', (state) => {
    if (isDriving) return; // אנחנו הנהג - המיקום שלנו כבר נכון מקומית
    carTargetX = state.x; carTargetY = state.y; carTargetZ = state.z; carTargetRotY = state.rotY;
  });
}

function updatePlayerListUI() {
  const body = document.getElementById('playerListBody');
  let html = `<div>🟦 ${myName} (אני) [${character.position.x.toFixed(0)}, ${character.position.y.toFixed(0)}, ${character.position.z.toFixed(0)}]</div>`;
  otherPlayers.forEach(op => {
    const dist = character.position.distanceTo(op.mesh.position).toFixed(0);
    html += `<div>🟩 ${op.name} [${op.mesh.position.x.toFixed(0)}, ${op.mesh.position.y.toFixed(0)}, ${op.mesh.position.z.toFixed(0)}] מרחק:${dist}</div>`;
  });
  body.innerHTML = html;
}

// מרעננים את הרשימה (עם המיקומים) כל חצי שנייה, גם בלי אירועי רשת
setInterval(() => { if (character) updatePlayerListUI(); }, 500);

function makeNameSprite(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 32px Arial';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.fillStyle = '#7fffa1';
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 42);
  const texture = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: texture });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(2, 0.5, 1);
  sprite.position.y = 2.3;
  return sprite;
}

function upgradePlaceholderPlayers() {
  if (!characterTemplate) return;
  otherPlayers.forEach((op, id) => {
    if (op.mesh.userData.legs) { // זו דמות זמנית - צריך לשדרג
      const prevPos = op.mesh.position.clone();
      const prevRotY = op.mesh.rotation.y;
      const prevName = op.name;
      scene.remove(op.mesh);
      const built = createCharacterInstance(0xe0563d);
      const mesh = built.mesh;
      mesh.position.copy(prevPos);
      mesh.rotation.y = prevRotY;
      mesh.scale.setScalar(built.isRealModel ? characterScale * characterBaseScale : characterScale);
      const nameSprite = makeNameSprite(prevName);
      mesh.add(nameSprite);
      scene.add(mesh);
      otherPlayers.set(id, {
        ...op, mesh, mixer: built.mixer, actions: built.actions
      });
    }
  });
}

function addOtherPlayer(p) {
  try {
    const built = createCharacterInstance(0xe0563d);
    const mesh = built.mesh;
    mesh.position.set(p.x, p.y, p.z);
    mesh.scale.setScalar(built.isRealModel ? characterScale * characterBaseScale : characterScale);
    const nameSprite = makeNameSprite(p.name);
    mesh.add(nameSprite);
    scene.add(mesh);
    otherPlayers.set(p.id, {
      mesh, name: p.name, targetX: p.x, targetY: p.y || 0, targetZ: p.z, targetRotY: p.rotY || 0,
      mixer: built.mixer, actions: built.actions, moving: false, running: false
    });
  } catch (err) {
    console.error('שגיאה בהוספת שחקן אחר:', err);
  }
}

function removeOtherPlayer(id) {
  const op = otherPlayers.get(id);
  if (op) { scene.remove(op.mesh); otherPlayers.delete(id); }
}

function initGame() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x8fc7e8);
  scene.fog = new THREE.Fog(0x8fc7e8, 50, 400);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  const hemi = new THREE.HemisphereLight(0xbfe3ff, 0x445533, 0.8);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xfff2d6, 1.1);
  sun.position.set(30, 50, 20);
  sun.castShadow = true;
  scene.add(sun);

  loadCityModel();
  loadHouseModel();
  loadCarModel();

  const built = createCharacterInstance(0x3d7ef5);
  character = built.mesh;
  character.position.set(0, 0, 5);
  character.visible = (cameraMode !== 'first');
  scene.add(character);

  // טוען את הדמות האמיתית (מ-Mixamo) + אנימציות ברקע, ומחליף את הדמות הזמנית כשהכל מוכן
  loadCharacterModel(() => {
    loadAnimations(() => {
      if (characterTemplate) {
        const prevPos = character.position.clone();
        const prevRotY = character.rotation.y;
        scene.remove(character);
        const rebuilt = createCharacterInstance(0x3d7ef5);
        character = rebuilt.mesh;
        selfMixer = rebuilt.mixer;
        selfActions = rebuilt.actions;
        character.position.copy(prevPos);
        character.rotation.y = prevRotY;
        character.visible = (cameraMode !== 'first');
        scene.add(character);
        const dbgBox2 = new THREE.Box3().setFromObject(character);
        console.log('[דיבאג דמות] גודל בפועל בסצנה:', dbgBox2.getSize(new THREE.Vector3()), 'מיקום:', character.position, 'scale:', character.scale);
      }
      upgradePlaceholderPlayers();
    });
  });

  updateCameraPosition(true);

  window.addEventListener('resize', onResize);
  function applyCityScale(newScale) {
    cityScale = newScale;
    cityModelRef.position.set(0, 0, 0);
    cityModelRef.scale.setScalar(cityScale);
    const box = new THREE.Box3().setFromObject(cityModelRef);
    const center = box.getCenter(new THREE.Vector3());
    cityModelRef.position.x -= center.x;
    cityModelRef.position.z -= center.z;
    cityModelRef.position.y -= box.min.y;
  }

  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (cityModelRef && (e.key === '+' || e.key === '=')) {
      applyCityScale(cityScale + 0.5);
      document.getElementById('status').textContent = 'קנה מידה מפה: ' + cityScale.toFixed(1) + ' (מקשי +/- לכיוונון)';
    }
    if (cityModelRef && e.key === '-') {
      applyCityScale(Math.max(0.5, cityScale - 0.5));
      document.getElementById('status').textContent = 'קנה מידה מפה: ' + cityScale.toFixed(1) + ' (מקשי +/- לכיוונון)';
    }
    if (e.key === '[') {
      characterScale = Math.max(0.1, characterScale - 0.1);
      const scaleVal = character.userData.legs ? characterScale : characterScale * characterBaseScale;
      character.scale.setScalar(scaleVal);
      otherPlayers.forEach(op => op.mesh.scale.setScalar(op.mesh.userData.legs ? characterScale : characterScale * characterBaseScale));
      document.getElementById('status').textContent = 'מכפיל גודל דמות: ' + characterScale.toFixed(2) + ' (מקשי [ ] לכיוונון)';
    }
    if (e.key === ']') {
      characterScale += 0.1;
      const scaleVal2 = character.userData.legs ? characterScale : characterScale * characterBaseScale;
      character.scale.setScalar(scaleVal2);
      otherPlayers.forEach(op => op.mesh.scale.setScalar(op.mesh.userData.legs ? characterScale : characterScale * characterBaseScale));
      document.getElementById('status').textContent = 'מכפיל גודל דמות: ' + characterScale.toFixed(2) + ' (מקשי [ ] לכיוונון)';
    }
  });
  window.addEventListener('keyup', e => keys[e.code] = false);
  renderer.domElement.addEventListener('mousedown', e => { mouseDown = true; lastMouseX = e.clientX; lastMouseY = e.clientY; });
  window.addEventListener('mouseup', () => mouseDown = false);
  window.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const dx = e.clientX - lastMouseX, dy = e.clientY - lastMouseY;
    lastMouseX = e.clientX; lastMouseY = e.clientY;
    cameraYaw -= dx * 0.005;
    if (cameraMode === 'first') {
      lookPitch = Math.max(-1.3, Math.min(1.3, lookPitch - dy * 0.005));
    } else {
      cameraPitch = Math.max(0.05, Math.min(1.2, cameraPitch - dy * 0.003));
    }
  });
  window.addEventListener('keydown', e => {
    if (e.code === 'KeyV') {
      cameraMode = (cameraMode === 'first') ? 'third' : 'first';
      character.visible = (cameraMode !== 'first') && !isDriving;
      document.getElementById('status').textContent = cameraMode === 'first' ? 'מצלמת גוף ראשון' : 'מצלמת גוף שלישי';
    }
    if (e.code === 'KeyE') {
      toggleCarEnter();
    }
  });

  animate();
}

function buildPlaceholderCharacter(bodyColor) {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.6 });
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xf2c197, roughness: 0.7 });
  const pantsMat = new THREE.MeshStandardMaterial({ color: 0x263447, roughness: 0.7 });

  // גוף: גליל עם כדור למעלה (מחליף CapsuleGeometry שלא קיים בגרסה הזו)
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.32, 0.55, 8), bodyMat);
  torso.position.y = 1.15; torso.castShadow = true; group.add(torso);
  const torsoCapTop = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), bodyMat);
  torsoCapTop.position.y = 1.42; torsoCapTop.castShadow = true; group.add(torsoCapTop);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.26, 16, 16), skinMat);
  head.position.y = 1.75; head.castShadow = true; group.add(head);

  function buildLimb(radius, length, mat) {
    const limb = new THREE.Group();
    const cyl = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, length, 8), mat);
    limb.add(cyl);
    const capTop = new THREE.Mesh(new THREE.SphereGeometry(radius, 8, 8), mat);
    capTop.position.y = length / 2; limb.add(capTop);
    const capBottom = new THREE.Mesh(new THREE.SphereGeometry(radius, 8, 8), mat);
    capBottom.position.y = -length / 2; limb.add(capBottom);
    limb.traverse(m => { if (m.isMesh) m.castShadow = true; });
    return limb;
  }

  const legL = buildLimb(0.14, 0.55, pantsMat);
  legL.position.set(-0.16, 0.45, 0); group.add(legL);
  const legR = buildLimb(0.14, 0.55, pantsMat);
  legR.position.set(0.16, 0.45, 0); group.add(legR);

  const armL = buildLimb(0.11, 0.5, skinMat);
  armL.position.set(-0.44, 1.2, 0); armL.rotation.z = 0.15; group.add(armL);
  const armR = buildLimb(0.11, 0.5, skinMat);
  armR.position.set(0.44, 1.2, 0); armR.rotation.z = -0.15; group.add(armR);

  group.userData.legs = [legL, legR];
  group.userData.arms = [armL, armR];
  return group;
}

let cityModelRef = null;
let cityScale = 1;
const groundMeshes = []; // כל המשטחים שאפשר לעמוד עליהם (דשא, כביש, מפה, בתים)
const groundRaycaster = new THREE.Raycaster();
const collidableMeshes = []; // דברים שאי אפשר לעבור דרכם (קירות, רהיטים) - כרגע: הבית
const collisionRaycaster = new THREE.Raycaster();
const COLLISION_RADIUS = 0.4; // "רדיוס גוף" השחקן - כמה מרחק לשמור ממכשולים
let currentGroundHeight = 0;
let characterScale = 3;
let characterBaseScale = 0.01;
const TARGET_CHARACTER_HEIGHT = 1.75;
let characterTemplate = null;
let characterAnimations = [];
let walkClip = null;
let runClip = null;
let idleClip = null;
let jumpClip = null;
let selfMixer = null;
let selfActions = null;
const otherMixers = new Map();

let houseTemplate = null;
const placedHouses = []; // { x, z, rotY, scale }

// --- מערכת מכונית (משותפת - מנוהלת על ידי השרת) ---
let carTemplate = null;
let carInstance = null;
let carScale = 1;
let isDriving = false;
let isPassenger = false;
let carSpeed = 0;
let engineAudioCtx = null;
let engineOscillator = null;
let engineGain = null;
let carRotationY = 0;
let carTargetX = -10, carTargetY = 0, carTargetZ = 15, carTargetRotY = Math.PI / 3;
const TARGET_CAR_LENGTH = 12; // אורך אמיתי במטרים (הוקטן פי 1.5 מ-18)
const CAR_MAX_SPEED = 0.7;
const CAR_REVERSE_SPEED = -0.3;
const CAR_ACCEL = 0.012;
const CAR_FRICTION = 0.008;
const CAR_TURN_SPEED = 0.035;
const ENTER_CAR_DISTANCE = 6;
let lastCarSentTime = 0;

// כאן נוסיף מיקומים לבתים - נעדכן את הרשימה כשיהיו לנו יותר בתים ונדע איפה המדשאות
const HOUSE_PLACEMENTS = [
  { x: 0, z: 40, rotY: 0, scale: 9, sink: 5.6 }
];

function loadCarModel() {
  const dracoLoader = new THREE.DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
  const gltfLoader = new THREE.GLTFLoader();
  gltfLoader.setDRACOLoader(dracoLoader);

  gltfLoader.load(
    '/models/car.glb',
    (gltf) => {
      carTemplate = gltf.scene;
      carTemplate.traverse(child => {
        if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
      });

      // חישוב קנה מידה אוטומטי לפי האורך האמיתי של מכונית (המודל המקורי בקנה מידה מוזר)
      const box = new THREE.Box3().setFromObject(carTemplate);
      const size = box.getSize(new THREE.Vector3());
      const rawLength = Math.max(size.x, size.z);
      carScale = TARGET_CAR_LENGTH / rawLength;

      placeCar(-10, 15, Math.PI / 3);
    },
    undefined,
    (error) => console.error('שגיאה בטעינת המכונית:', error)
  );
}

function placeCar(x, z, rotY) {
  if (!carTemplate) return;
  const car = carTemplate.clone();
  car.rotation.y = rotY || 0;
  car.scale.setScalar(carScale);
  car.position.set(x, 0, z);
  car.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(car);

  let terrainY = 0;
  if (groundMeshes.length > 0) {
    const ray = new THREE.Raycaster(new THREE.Vector3(x, 500, z), new THREE.Vector3(0, -1, 0));
    ray.far = 1000;
    const hits = ray.intersectObjects(groundMeshes, true);
    if (hits.length > 0) terrainY = hits[0].point.y;
  }
  car.position.y = terrainY - box.min.y;

  scene.add(car);
  carInstance = car;
  carRotationY = rotY || 0;
}

function loadHouseModel() {
  const dracoLoader = new THREE.DRACOLoader();

      });
      HOUSE_PLACEMENTS.forEach(p => placeHouse(p.x, p.z, p.rotY, p.scale, p.sink));
    },

  );

function placeHouse(x, z, rotY, scaleVal, sinkAmount) {
  if (!houseTemplate) return;
  const house = houseTemplate.clone();
  house.rotation.y = rotY || 0;
  house.scale.setScalar(scaleVal || 1);
  house.position.set(x, 0, z);
  house.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(house);

  // מוצאים את גובה הקרקע האמיתי - בודקים כמה נקודות מתחת לבית (מרכז + 4 פינות) ולוקחים את הנמוך ביותר,
  // כדי שהבית לא "יצוף" באוויר אם השטח לא לגמרי ישר
  let terrainY = 0;
  if (groundMeshes.length > 0) {
    const footprint = Math.max(box.max.x - box.min.x, box.max.z - box.min.z) / 2;
    const samplePoints = [
      [x, z], [x - footprint, z - footprint], [x + footprint, z - footprint],
      [x - footprint, z + footprint], [x + footprint, z + footprint]
    ];
    let minY = null;
    samplePoints.forEach(([sx, sz]) => {
      const ray = new THREE.Raycaster(new THREE.Vector3(sx, 500, sz), new THREE.Vector3(0, -1, 0));
      ray.far = 1000;
      const hits = ray.intersectObjects(groundMeshes, true);
      if (hits.length > 0) {
        if (minY === null || hits[0].point.y < minY) minY = hits[0].point.y;
      }
    });
    if (minY !== null) terrainY = minY;
  }
  house.position.y = terrainY - box.min.y - (sinkAmount || 0);

  scene.add(house);
  placedHouses.push(house);
  groundMeshes.push(house); // בטוח עכשיו כי חיישן הגובה קצר-טווח ולא יתפוס גגות מעל הראש
  collidableMeshes.push(house); // אי אפשר לעבור דרך קירות/רהיטים בבית
}

function loadCityModel() {

// יוצר עותק תקין (כולל שלד) של הדמות שנטענה, או נופל חזרה לדמות הפשוטה אם עוד לא נטענה
function createCharacterInstance(fallbackColor) {
  if (characterTemplate) {
    try {
      const clone = THREE.SkeletonUtils.clone(characterTemplate);
      clone.traverse(child => { if (child.isMesh || child.isSkinnedMesh) child.frustumCulled = false; });
      // המרה מיחידות מיימו (ס"מ) ליחידות המשחק + קנה המידה הכללי של הדמות
      clone.scale.setScalar(characterScale * characterBaseScale);

      let mixer = null;
      let actions = null;
      if (walkClip || runClip || idleClip || jumpClip) {
        mixer = new THREE.AnimationMixer(clone);
        actions = {
          idle: idleClip ? mixer.clipAction(idleClip) : null,
          walk: walkClip ? mixer.clipAction(walkClip) : null,
          run: runClip ? mixer.clipAction(runClip) : null,
          jump: jumpClip ? mixer.clipAction(jumpClip) : null
        };
        if (actions.idle) { actions.idle.play(); actions.idle.setEffectiveWeight(1); }
        if (actions.walk) { actions.walk.play(); actions.walk.setEffectiveWeight(0); actions.walk.setEffectiveTimeScale(0.6); }
        if (actions.run) { actions.run.play(); actions.run.setEffectiveWeight(0); actions.run.setEffectiveTimeScale(0.6); }
        if (actions.jump) {
          actions.jump.setLoop(THREE.LoopOnce);
          actions.jump.clampWhenFinished = true;
        }
      }

      return { mesh: clone, isRealModel: true, mixer, actions };
    } catch (err) {
      console.error('שגיאה ביצירת עותק דמות - נופל לדמות זמנית:', err);
      return { mesh: buildPlaceholderCharacter(fallbackColor), isRealModel: false, mixer: null, actions: null };
    }
  }
  return { mesh: buildPlaceholderCharacter(fallbackColor), isRealModel: false, mixer: null, actions: null };
}

function addPlaceholderBuildings() {
  const colors = [0xd9c2a3, 0xc4a3d9, 0xa3d9c4, 0xd9a3a3, 0xa3c4d9];
  for (let i = 0; i < 14; i++) {
    const w = 4 + Math.random() * 3, d = 4 + Math.random() * 3, h = 4 + Math.random() * 5;
    const mat = new THREE.MeshStandardMaterial({ color: colors[i % colors.length], roughness: 0.8 });
    const box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    const side = i % 2 === 0 ? -1 : 1;
    const x = side * (8 + Math.random() * 20);
    const z = -60 + i * 9 + (Math.random() * 4 - 2);
    box.position.set(x, h / 2, z);
    box.castShadow = true; box.receiveShadow = true;
    scene.add(box);
    const roof = new THREE.Mesh(new THREE.ConeGeometry(Math.max(w, d) * 0.75, 1.6, 4), new THREE.MeshStandardMaterial({ color: 0x7a5230, roughness: 0.9 }));
    roof.position.set(x, h + 0.8, z); roof.rotation.y = Math.PI / 4; roof.castShadow = true;
    scene.add(roof);

// תיקון גובה מיידי וחד-פעמי, עם טווח חיפוש רחב - לשימוש בזמן טעינה/הצטרפות, לא כל פריים
function snapCharacterToGround() {
  if (!character || groundMeshes.length === 0) return;
  const ray = new THREE.Raycaster(
    new THREE.Vector3(character.position.x, 500, character.position.z),
    new THREE.Vector3(0, -1, 0)
  );
  ray.far = 2000;
  const hits = ray.intersectObjects(groundMeshes, true);
  if (hits.length > 0) {
    currentGroundHeight = hits[0].point.y;
    character.position.y = currentGroundHeight;
  }
}

// בודק אם יש מכשול קרוב בכיוון התנועה (קיר, רהיט) ומונע מעבר דרכו
function checkHorizontalCollision(fromX, fromZ, toX, toZ) {
  if (collidableMeshes.length === 0) return { x: toX, z: toZ };
  const dx = toX - fromX, dz = toZ - fromZ;
  const dist = Math.sqrt(dx * dx + dz * dz);
  if (dist < 0.0001) return { x: toX, z: toZ };

  const dir = new THREE.Vector3(dx, 0, dz).normalize();
  const origin = new THREE.Vector3(fromX, character.position.y + 1.0, fromZ);
  collisionRaycaster.set(origin, dir);
  collisionRaycaster.far = dist + COLLISION_RADIUS;
  const hits = collisionRaycaster.intersectObjects(collidableMeshes, true);
  if (hits.length > 0 && hits[0].distance < dist + COLLISION_RADIUS) {
    // יש מכשול - נעצור קצת לפני הפגיעה, לא נעבור דרכו
    const safeDist = Math.max(0, hits[0].distance - COLLISION_RADIUS);
    return { x: fromX + dir.x * safeDist, z: fromZ + dir.z * safeDist };
  }
  return { x: toX, z: toZ };
}

let lastGroundCheck = 0;
function updateGroundHeight() {
  const now = performance.now();
  if (now - lastGroundCheck < 100) return; // בודקים כל 100ms בלבד, לא כל פריים - לביצועים
  lastGroundCheck = now;
  if (groundMeshes.length === 0) return;

  groundRaycaster.set(
    new THREE.Vector3(character.position.x, character.position.y + 1.2, character.position.z),
    new THREE.Vector3(0, -1, 0)
  );
  groundRaycaster.far = 6; // טווח קצר - תופס מדרגות/סף בית, לא גגות שנמצאים גבוה הרבה מעל הראש
  const hits = groundRaycaster.intersectObjects(groundMeshes, true);
  if (hits.length > 0) {
    currentGroundHeight = hits[0].point.y;
  }
}

let lastSentTime = 0;
let engineOsc2 = null;
let engineLFO = null;
let engineFilter = null;

function startEngineSound() {
  try {
    if (!engineAudioCtx) engineAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (engineAudioCtx.state === 'suspended') engineAudioCtx.resume();
    const ctx = engineAudioCtx;

    // מסנן שמרכך את הצליל ונותן תחושה "רועשת" ולא צפצוף נקי
    engineFilter = ctx.createBiquadFilter();
    engineFilter.type = 'lowpass';
    engineFilter.frequency.value = 400;

    engineGain = ctx.createGain();
    engineGain.gain.value = 0.05;

    // אוסילטור ראשי (הבסיס הנמוך של המנוע)
    engineOscillator = ctx.createOscillator();
    engineOscillator.type = 'sawtooth';
    engineOscillator.frequency.value = 45;

    // אוסילטור שני, אוקטבה מעל, נותן עושר לצליל (כמו כמה בוכנות)
    engineOsc2 = ctx.createOscillator();
    engineOsc2.type = 'square';
    engineOsc2.frequency.value = 90;
    const osc2Gain = ctx.createGain();
    osc2Gain.gain.value = 0.35;

    // LFO - רעד עדין בתדר, נותן תחושה של "רעש מנוע" ולא צליל אלקטרוני נקי
    engineLFO = ctx.createOscillator();
    engineLFO.type = 'sine';
    engineLFO.frequency.value = 9;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 6;
    engineLFO.connect(lfoGain);
    lfoGain.connect(engineOscillator.frequency);

    engineOscillator.connect(engineFilter);
    engineOsc2.connect(osc2Gain);
    osc2Gain.connect(engineFilter);
    engineFilter.connect(engineGain);
    engineGain.connect(ctx.destination);

    engineOscillator.start();
    engineOsc2.start();
    engineLFO.start();
  } catch (err) {
    console.error('שגיאה בהפעלת סאונד המנוע:', err);
  }
}

function stopEngineSound() {
  [engineOscillator, engineOsc2, engineLFO].forEach(node => {
    if (node) { try { node.stop(); } catch (e) {} node.disconnect(); }
  });
  engineOscillator = null; engineOsc2 = null; engineLFO = null;
  if (engineFilter) { engineFilter.disconnect(); engineFilter = null; }
  if (engineGain) { engineGain.disconnect(); engineGain = null; }
}

function toggleCarEnter() {
  if (!carInstance || !socket) return;

  if (!isDriving && !isPassenger) {
    const dist = character.position.distanceTo(carInstance.position);
    if (dist > ENTER_CAR_DISTANCE) return; // רחוק מדי מהמכונית
    socket.emit('enterCarRequest');
    // התשובה בפועל (אם התקבלת כנהג/נוסע) מגיעה מהשרת דרך אירוע carState
  } else {
    socket.emit('exitCarRequest');
    stopEngineSound();
    // יוצאים ליד דלת המכונית (מקומי מיידי - לא מחכים לשרת בשביל זה)
    const exitOffset = new THREE.Vector3(2.5, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), carRotationY);
    character.position.set(carInstance.position.x + exitOffset.x, carInstance.position.y, carInstance.position.z + exitOffset.z);
    character.rotation.y = carRotationY;
    character.visible = (cameraMode !== 'first');
    isDriving = false;
    isPassenger = false;
    document.getElementById('status').textContent = 'ירדת מהמכונית';
  }
}

function updateCarPhysics(dt) {
  if (!carInstance) return;

  const forward = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
  const turn = (keys['KeyA'] ? 1 : 0) - (keys['KeyD'] ? 1 : 0);

  if (forward > 0) {
    carSpeed = Math.min(CAR_MAX_SPEED, carSpeed + CAR_ACCEL);
  } else if (forward < 0) {
    carSpeed = Math.max(CAR_REVERSE_SPEED, carSpeed - CAR_ACCEL);
  } else {
    // חיכוך טבעי - האטה הדרגתית כשלא לוחצים גז
    if (carSpeed > 0) carSpeed = Math.max(0, carSpeed - CAR_FRICTION);
    else if (carSpeed < 0) carSpeed = Math.min(0, carSpeed + CAR_FRICTION);
  }

  // עדכון סאונד המנוע - גובה הצליל עולה עם המהירות, עוצמה עולה כשלוחצים גז
  if (engineOscillator && engineOsc2 && engineGain && engineFilter) {
    const speedFactor = Math.abs(carSpeed) / CAR_MAX_SPEED; // 0 עד 1
    const gasBoost = forward !== 0 ? 25 : 0;
    const baseFreq = 40 + speedFactor * 110 + gasBoost;
    const now = engineAudioCtx.currentTime;
    engineOscillator.frequency.setTargetAtTime(baseFreq, now, 0.08);
    engineOsc2.frequency.setTargetAtTime(baseFreq * 2.02, now, 0.08); // מעט לא מכוון בכוונה - נותן "רעש" טבעי
    engineFilter.frequency.setTargetAtTime(300 + speedFactor * 900, now, 0.1);
    const targetVol = forward !== 0 ? 0.09 : 0.05;
    engineGain.gain.setTargetAtTime(targetVol, now, 0.08);
  }

  // היגוי - רק כשיש תנועה, וביחס למהירות (כמו רכב אמיתי)
  if (Math.abs(carSpeed) > 0.01) {
    const turnFactor = carSpeed > 0 ? 1 : -1;
    carRotationY += turn * CAR_TURN_SPEED * turnFactor;
  }

  const dx = Math.sin(carRotationY) * carSpeed;
  const dz = Math.cos(carRotationY) * carSpeed;
  carInstance.position.x += dx;
  carInstance.position.z += dz;
  carInstance.rotation.y = carRotationY;

  // חיישן גובה למכונית - כדי שתישאר על הכביש
  const ray = new THREE.Raycaster(
    new THREE.Vector3(carInstance.position.x, carInstance.position.y + 2, carInstance.position.z),
    new THREE.Vector3(0, -1, 0)
  );
  ray.far = 10;
  const hits = ray.intersectObjects(groundMeshes, true);
  if (hits.length > 0) carInstance.position.y = hits[0].point.y;

  // המצלמה עוקבת מאחורי המכונית
  const camDist = 8, camHeight = 4;
  const camX = carInstance.position.x - Math.sin(carRotationY) * camDist;
  const camZ = carInstance.position.z - Math.cos(carRotationY) * camDist;
  const camY = carInstance.position.y + camHeight;
  camera.position.x += (camX - camera.position.x) * 0.15;
  camera.position.y += (camY - camera.position.y) * 0.15;
  camera.position.z += (camZ - camera.position.z) * 0.15;
  camera.lookAt(carInstance.position.x, carInstance.position.y + 1, carInstance.position.z);

  // שומרים את הדמות "בפנים" (למקרה שנצא בלי לזוז) בלי לשדר תנועה מיותרת
  character.position.copy(carInstance.position);

  // משדרים לשרת את מיקום הרכב, כ-20 פעמים בשנייה - כדי שכל השחקנים האחרים יראו אותו זז
  const now2 = performance.now();
  if (socket && socket.connected && now2 - lastCarSentTime > 50) {
    lastCarSentTime = now2;
    socket.emit('carMove', {
      x: carInstance.position.x, y: carInstance.position.y,
      z: carInstance.position.z, rotY: carRotationY
    });
  }
}

// לנוסע וגם לצופים מהצד - מזיז את המכונית חלק לפי מה שהתקבל מהשרת (לא שולט בה)
function updateCarInterpolation(dt) {
  if (!carInstance) return;
  carInstance.position.x += (carTargetX - carInstance.position.x) * 0.2;
  carInstance.position.y += (carTargetY - carInstance.position.y) * 0.2;
  carInstance.position.z += (carTargetZ - carInstance.position.z) * 0.2;
  carInstance.rotation.y = carTargetRotY;

  if (isPassenger) {
    // הנוסע יושב באותו רכב, המצלמה עוקבת מאחור בדיוק כמו אצל הנהג
    const camDist = 8, camHeight = 4;
    const camX = carInstance.position.x - Math.sin(carTargetRotY) * camDist;
    const camZ = carInstance.position.z - Math.cos(carTargetRotY) * camDist;
    const camY = carInstance.position.y + camHeight;
    camera.position.x += (camX - camera.position.x) * 0.15;
    camera.position.y += (camY - camera.position.y) * 0.15;
    camera.position.z += (camZ - camera.position.z) * 0.15;
    camera.lookAt(carInstance.position.x, carInstance.position.y + 1, carInstance.position.z);
    character.position.copy(carInstance.position);
  }
}

function updateMovement() {
  const forward = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
  const strafe = (keys['KeyA'] ? 1 : 0) - (keys['KeyD'] ? 1 : 0);
  const running = keys['ShiftLeft'] || keys['ShiftRight'];
  const speed = running ? RUN_SPEED : WALK_SPEED;
  let vx = 0, vz = 0;

  if (forward !== 0 || strafe !== 0) {
    const moveAngle = Math.atan2(strafe, forward);
    const targetAngle = cameraYaw + moveAngle;
    vx = Math.sin(targetAngle) * speed;
    vz = Math.cos(targetAngle) * speed;
    facingAngle = targetAngle;
    character.rotation.y = facingAngle;
    if (character.userData.legs) {
      const t = clock.getElapsedTime() * (running ? 10 : 6);
      const swing = Math.sin(t) * 0.5;
      character.userData.legs[0].rotation.x = swing;
      character.userData.legs[1].rotation.x = -swing;
      character.userData.arms[0].rotation.x = -swing;
      character.userData.arms[1].rotation.x = swing;
    }
  } else if (character.userData.legs) {
    character.userData.legs[0].rotation.x *= 0.8;
    character.userData.legs[1].rotation.x *= 0.8;
    character.userData.arms[0].rotation.x *= 0.8;
    character.userData.arms[1].rotation.x *= 0.8;
  }

  const desiredX = character.position.x + vx;
  const desiredZ = character.position.z + vz;
  const safePos = checkHorizontalCollision(character.position.x, character.position.z, desiredX, desiredZ);
  character.position.x = safePos.x;
  character.position.z = safePos.z;

  updateGroundHeight();

  let justJumped = false;
  if (keys['Space'] && isGrounded) {
    verticalVelocity = JUMP_FORCE;
    isGrounded = false;
    justJumped = true;
    triggerJump(selfActions);
  }
  verticalVelocity += GRAVITY;
  character.position.y += verticalVelocity;
  if (character.position.y <= currentGroundHeight) {
    character.position.y = currentGroundHeight;
    verticalVelocity = 0;
    isGrounded = true;
  }

  character.position.x = Math.max(-1000, Math.min(1000, character.position.x));
  character.position.z = Math.max(-1000, Math.min(1000, character.position.z));

  // שולח מיקום לשרת כ-20 פעמים בשנייה
  const now = performance.now();
  if (socket && socket.connected && (now - lastSentTime > 50 || justJumped)) {
    lastSentTime = now;
    socket.emit('move', {
      x: character.position.x, y: character.position.y,
      z: character.position.z, rotY: character.rotation.y,
      moving: (forward !== 0 || strafe !== 0), running: !!running,
      jumped: justJumped
    });
  }
}

function setActionWeights(actions, moving, running, dt) {
  if (!actions) return;
  const targetWalk = (moving && !running) ? 1 : 0;
  const targetRun = (moving && running) ? 1 : 0;
  const targetIdle = moving ? 0 : 1;
  const speed = 5 * dt;
  if (actions.walk) actions.walk.setEffectiveWeight(
    actions.walk.getEffectiveWeight() + (targetWalk - actions.walk.getEffectiveWeight()) * speed
  );
  if (actions.run) actions.run.setEffectiveWeight(
    actions.run.getEffectiveWeight() + (targetRun - actions.run.getEffectiveWeight()) * speed
  );
  if (actions.idle) actions.idle.setEffectiveWeight(
    actions.idle.getEffectiveWeight() + (targetIdle - actions.idle.getEffectiveWeight()) * speed
  );
}

function triggerJump(actions) {
  if (actions && actions.jump) {
    actions.jump.reset();
    actions.jump.setEffectiveWeight(1);
    actions.jump.play();
    if (actions.idle) actions.idle.setEffectiveWeight(0);
    if (actions.walk) actions.walk.setEffectiveWeight(0);
    if (actions.run) actions.run.setEffectiveWeight(0);
  }
}

function updateOtherPlayers(dt) {
  otherPlayers.forEach(op => {
    op.mesh.position.x += (op.targetX - op.mesh.position.x) * 0.25;
    op.mesh.position.y += (op.targetY - op.mesh.position.y) * 0.25;
    op.mesh.position.z += (op.targetZ - op.mesh.position.z) * 0.25;
    op.mesh.rotation.y = op.targetRotY;
    if (op.mixer) {
      setActionWeights(op.actions, op.moving, op.running, dt);
      op.mixer.update(dt);
    }
  });
}

function updateCameraPosition(instant) {
  if (cameraMode === 'first') {
    const eyeX = character.position.x;
    const eyeY = character.position.y + getEyeHeight();
    const eyeZ = character.position.z;
    camera.position.set(eyeX, eyeY, eyeZ);

    const dirX = Math.sin(cameraYaw) * Math.cos(lookPitch);
    const dirY = Math.sin(lookPitch);
    const dirZ = Math.cos(cameraYaw) * Math.cos(lookPitch);
    camera.lookAt(eyeX + dirX, eyeY + dirY, eyeZ + dirZ);

    // הדמות פונה לכיוון שאתה מסתכל אליו (רק אופקית) - גוף ראשון
    character.rotation.y = cameraYaw;
    return;
  }

  const targetX = character.position.x - Math.sin(cameraYaw) * CAMERA_DISTANCE * Math.cos(cameraPitch);
  const targetZ = character.position.z - Math.cos(cameraYaw) * CAMERA_DISTANCE * Math.cos(cameraPitch);
  const targetY = character.position.y + getEyeHeight() + CAMERA_DISTANCE * Math.sin(cameraPitch);
  if (instant) {
    camera.position.set(targetX, targetY, targetZ);
  } else {
    camera.position.x += (targetX - camera.position.x) * 0.18;
    camera.position.y += (targetY - camera.position.y) * 0.18;
    camera.position.z += (targetZ - camera.position.z) * 0.18;
  }
  camera.lookAt(character.position.x, character.position.y + getEyeHeight() * 0.8, character.position.z);
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  if (isDriving) {
    updateCarPhysics(dt);
  } else if (isPassenger) {
    updateCarInterpolation(dt);
  } else {
    updateMovement();
    updateCarInterpolation(dt); // גם הולכי רגל רואים את הרכב זז חלק, לא רק מי שבפנים
    if (selfMixer) {
      const forwardNow = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
      const strafeNow = (keys['KeyA'] ? 1 : 0) - (keys['KeyD'] ? 1 : 0);
      const runningNow = keys['ShiftLeft'] || keys['ShiftRight'];
      setActionWeights(selfActions, (forwardNow !== 0 || strafeNow !== 0), !!runningNow, dt);
      selfMixer.update(dt);
    }
    updateCameraPosition(false);
  }
  updateOtherPlayers(dt);
  renderer.render(scene, camera);
}
</script>
